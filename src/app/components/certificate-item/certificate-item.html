<div
  class="w-full flex items-center justify-center gap-5 rounded-lg p-4 border border-gray-100"
>
  <!-- TEXT -->
  <div class="flex flex-col gap-0.5 flex-1">
    <strong class="text-blue-dark text-sm font-bold">
      {{ certificateData.studentName }}
    </strong>
    <span class="text-gray-200 text-xs"> Gerado em {{ formattedDate }} </span>
  </div>

  <div class="flex gap-2">
    <app-secondary-button
      (click)="redirectToCertificate()"
      phClass="ph-eye"
      className="p-2.5"
    />

    <app-secondary-button
      (click)="handleDeleteCertificate()"
      phClass="ph-trash"
      className="p-2.5 bg-danger-base"
    />
  </div>
</div>
